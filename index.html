<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Learning Exercises</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="page-wrapper">
            <learning-header
                title="Learning Exercises"
                subtitle="Pick a fun activity and start learning!"
            ></learning-header>

            <main class="card-grid">
                <article class="exercise-card">
                    <div class="card-image-wrapper">
                        <img src=".images/card-img/common-words.webp" alt="Common Words" class="card-image" />
                    </div>
                    <div class="card-body">
                        <h2 class="card-title">Common Words</h2>
                        <p class="card-description">Listen to and spell the 100 most common words in English!</p>
                    </div>
                </article>
            </main>
        </div>

        <script src="components/learning-header.js" defer></script>
        <script src="script.js" defer></script>
    </body>
</html>
