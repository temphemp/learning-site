<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Learning Exercises</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="page-wrapper">
            <header class="hero">
                <div class="hero-bubbles">
                    <span class="bubble bubble-1"></span>
                    <span class="bubble bubble-2"></span>
                    <span class="bubble bubble-3"></span>
                    <span class="bubble bubble-4"></span>
                    <span class="bubble bubble-5"></span>
                </div>
                <h1 class="hero-title">Learning Exercises</h1>
                <p class="hero-subtitle">Pick a fun activity and start learning!</p>
            </header>

            <main class="card-grid">
                <article class="exercise-card">
                    <div class="card-image-wrapper">
                        <img src=".images/card-img/common-words.webp" alt="Common Words" class="card-image" />
                    </div>
                    <div class="card-body">
                        <h2 class="card-title">Common Words</h2>
                        <p class="card-description">Listen to and spell the 100 most common words in English!</p>
                    </div>
                </article>
            </main>
        </div>

        <script src="script.js"></script>
    </body>
</html>
