<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E17055"/>
      <stop offset="100%" stop-color="#D63031"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg6)"/>
  <!-- Musical notes -->
  <text x="50"  y="80"  font-family="Fredoka,sans-serif" font-size="50" fill="rgba(255,255,255,0.2)">♪</text>
  <text x="310" y="60"  font-family="Fredoka,sans-serif" font-size="60" fill="rgba(255,255,255,0.15)">♫</text>
  <text x="180" y="230" font-family="Fredoka,sans-serif" font-size="40" fill="rgba(255,255,255,0.2)">♩</text>
  <!-- Piano keys -->
  <rect x="100" y="80"  width="200" height="100" rx="12" fill="#fff" opacity="0.9"/>
  <!-- White keys -->
  <line x1="140" y1="80" x2="140" y2="180" stroke="#DFE6E9" stroke-width="2"/>
  <line x1="180" y1="80" x2="180" y2="180" stroke="#DFE6E9" stroke-width="2"/>
  <line x1="220" y1="80" x2="220" y2="180" stroke="#DFE6E9" stroke-width="2"/>
  <line x1="260" y1="80" x2="260" y2="180" stroke="#DFE6E9" stroke-width="2"/>
  <!-- Black keys -->
  <rect x="127" y="80" width="18" height="55" rx="4" fill="#2D3436"/>
  <rect x="167" y="80" width="18" height="55" rx="4" fill="#2D3436"/>
  <rect x="227" y="80" width="18" height="55" rx="4" fill="#2D3436"/>
  <rect x="257" y="80" width="18" height="55" rx="4" fill="#2D3436"/>
  <!-- Sparkles -->
  <circle cx="340" cy="200" r="5" fill="#FDCB6E" opacity="0.7"/>
  <circle cx="60"  cy="200" r="4" fill="#FD79A8" opacity="0.7"/>
  <circle cx="370" cy="120" r="3" fill="#fff" opacity="0.5"/>
</svg>
