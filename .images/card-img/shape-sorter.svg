  <polygon points="340,55 385,150 295,150" fill="#00CEC9" opacity="0.85"/>
  <!-- Small decorative shapes -->
  <rect x="60"  y="200" width="30" height="30" rx="6" fill="#fff" opacity="0.3" transform="rotate(15 75 215)"/>
  <circle cx="320" cy="210" r="15" fill="#fff" opacity="0.3"/>
  <polygon points="180,220 195,195 210,220" fill="#fff" opacity="0.3"/>
  <!-- Brain icon hint -->
  <text x="200" y="175" font-family="Fredoka,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Sort the shapes!</text>
