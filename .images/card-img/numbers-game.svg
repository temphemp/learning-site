<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg1)"/>
  <!-- Floating numbers -->
  <text x="60"  y="90"  font-family="Fredoka,sans-serif" font-size="64" font-weight="700" fill="rgba(255,255,255,0.25)">3</text>
  <text x="280" y="70"  font-family="Fredoka,sans-serif" font-size="48" font-weight="700" fill="rgba(255,255,255,0.3)">7</text>
  <text x="160" y="200" font-family="Fredoka,sans-serif" font-size="80" font-weight="700" fill="rgba(255,255,255,0.2)">1</text>
  <text x="330" y="190" font-family="Fredoka,sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.35)">9</text>
  <!-- Calculator icon -->
  <rect x="140" y="60" width="120" height="140" rx="16" fill="#fff" opacity="0.9"/>
  <rect x="155" y="75" width="90" height="35" rx="8" fill="#DFE6FF"/>
  <circle cx="170" cy="140" r="10" fill="#FD79A8"/>
  <circle cx="200" cy="140" r="10" fill="#FDCB6E"/>
  <circle cx="230" cy="140" r="10" fill="#00CEC9"/>
  <circle cx="170" cy="170" r="10" fill="#74B9FF"/>
  <circle cx="200" cy="170" r="10" fill="#E17055"/>
  <circle cx="230" cy="170" r="10" fill="#6C5CE7"/>
  <text x="170" y="100" font-family="Fredoka,sans-serif" font-size="22" font-weight="600" fill="#6C5CE7">128</text>
