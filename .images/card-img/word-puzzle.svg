<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FD79A8"/>
      <stop offset="100%" stop-color="#E84393"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg2)"/>
  <!-- Scrabble-like tiles -->
  <rect x="80"  y="80"  width="50" height="50" rx="8" fill="#fff" opacity="0.9"/>
  <text x="105" y="116" font-family="Fredoka,sans-serif" font-size="28" font-weight="700" fill="#E84393" text-anchor="middle">W</text>
  <rect x="140" y="80"  width="50" height="50" rx="8" fill="#fff" opacity="0.9"/>
  <text x="165" y="116" font-family="Fredoka,sans-serif" font-size="28" font-weight="700" fill="#E84393" text-anchor="middle">O</text>
  <rect x="200" y="80"  width="50" height="50" rx="8" fill="#fff" opacity="0.9"/>
  <text x="225" y="116" font-family="Fredoka,sans-serif" font-size="28" font-weight="700" fill="#E84393" text-anchor="middle">R</text>
  <rect x="260" y="80"  width="50" height="50" rx="8" fill="#fff" opacity="0.9"/>
  <text x="285" y="116" font-family="Fredoka,sans-serif" font-size="28" font-weight="700" fill="#E84393" text-anchor="middle">D</text>
  <!-- Floating letters -->
  <text x="50"  y="210" font-family="Fredoka,sans-serif" font-size="40" font-weight="700" fill="rgba(255,255,255,0.2)">A</text>
  <text x="320" y="60"  font-family="Fredoka,sans-serif" font-size="50" font-weight="700" fill="rgba(255,255,255,0.2)">Z</text>
  <text x="350" y="220" font-family="Fredoka,sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.25)">Q</text>
  <!-- Magnifying glass -->
  <circle cx="310" cy="170" r="28" fill="none" stroke="#fff" stroke-width="4" opacity="0.8"/>
  <line x1="332" y1="192" x2="355" y2="215" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>
